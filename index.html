<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="pragma" content="no-cache">
<meta http-equiv="expires" content="0">
<title>Via Gálica — Asterix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;font-family:'Segoe UI',sans-serif;display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;user-select:none}
.game{width:100vw;height:100dvh;max-width:600px;background:linear-gradient(180deg,#2d4a3e,#3a5a4a);display:flex;flex-direction:column;position:relative;overflow:hidden}
.header{display:flex;justify-content:space-between;align-items:center;padding:4px 10px;color:#ddd;font-size:clamp(11px,2.5vw,14px);flex-shrink:0;background:rgba(0,0,0,0.3)}
.header .score{color:#f1c40f;font-weight:700}
.header .level{color:#4ecca3}
.road-label{text-align:center;color:#ddd;font-size:clamp(11px,2.5vw,13px);padding:2px;font-style:italic}
.grid-area{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2px;overflow:hidden}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:clamp(2px,0.5vw,4px);width:min(100%,500px);aspect-ratio:1;padding:4px}
.card{position:relative;border-radius:6px;overflow:hidden;cursor:default;transition:all 0.2s;border:2px solid #5a7a5a;background:#4a6a4a;min-width:0}
.card.forest{background:#3d6b3d}
.card.road{border-color:#8a7a5a}
.card.missing{border-color:#f1c40f;border-style:dashed;background:rgba(241,196,15,0.08);cursor:pointer}
@keyframes pulseGlow{0%,100%{border-color:#f1c40f;box-shadow:0 0 5px rgba(241,196,15,0.3)}50%{border-color:#fff7a0;box-shadow:0 0 12px rgba(241,196,15,0.7)}}
.card.active-missing{animation:pulseGlow 1.2s ease-in-out infinite;border-color:#fff7a0}
.card.missing:hover{border-color:#4ecca3;transform:scale(1.05)}
.card.missing .qmark{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:clamp(16px,4vw,30px);color:#f1c40f;font-weight:700}
.card.filled{border-color:#4ecca3;animation:popIn 0.3s ease}
.card svg{width:100%;height:100%;display:block}
.char-icon{position:absolute;width:clamp(20px,5vw,36px);height:clamp(20px,5vw,36px);object-fit:contain;pointer-events:none;z-index:2}
@keyframes popIn{0%{transform:scale(0)}60%{transform:scale(1.2)}100%{transform:scale(1)}}

.choices{display:grid;grid-template-columns:repeat(4,1fr);gap:clamp(4px,1vw,8px);padding:4px 10px 8px;flex-shrink:0}
.choice-btn{background:#3a5a3a;border:3px solid #5a7a5a;border-radius:10px;padding:4px;cursor:pointer;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;aspect-ratio:1;position:relative}
.choice-btn:hover{border-color:#f1c40f;transform:scale(1.05)}
.choice-btn.correct{border-color:#4ecca3;background:rgba(78,204,163,0.15)}
.choice-btn.wrong{border-color:#e74c3c;background:rgba(231,76,60,0.15);animation:shake 0.35s}
.choice-btn svg{width:100%;height:100%}
.choice-btn .ch-roman{position:absolute;bottom:clamp(8px,2vw,14px);right:clamp(4px,1vw,8px);width:clamp(10px,2.5vw,18px);height:clamp(10px,2.5vw,18px);object-fit:contain;opacity:0.7;pointer-events:none}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}

.feedback{text-align:center;min-height:18px;flex-shrink:0;font-size:clamp(12px,2.5vw,15px);font-weight:600}
.feedback.ok{color:#4ecca3}.feedback.fail{color:#e74c3c}

/* Win overlay */
.win-overlay{position:absolute;inset:0;z-index:200;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;justify-content:center;align-items:center;opacity:0;pointer-events:none;transition:opacity 0.5s;padding:20px;text-align:center}
.win-overlay.active{opacity:1;pointer-events:all}
.win-overlay h2{font-size:clamp(22px,6vw,40px);color:#f1c40f;margin-bottom:4px}
.win-overlay .sub{font-size:clamp(16px,4vw,28px);color:#4ecca3;margin:6px 0}
.win-overlay .reward{font-size:clamp(40px,12vw,80px);margin:8px 0}
.win-overlay .reward-img{width:clamp(60px,16vw,120px);height:clamp(60px,16vw,120px);object-fit:contain;border-radius:12px;background:rgba(255,255,255,0.1);padding:8px}
.win-overlay button{padding:10px 32px;font-size:clamp(14px,3vw,18px);font-weight:700;background:#4ecca3;color:#1a1a2e;border:none;border-radius:12px;cursor:pointer;margin-top:10px}

/* Start overlay */
.start-overlay{position:absolute;inset:0;z-index:300;background:rgba(30,60,40,0.95);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:30px;text-align:center;transition:opacity 0.5s}
.start-overlay.hidden{opacity:0;pointer-events:none}
.start-overlay .logo{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.start-overlay .logo img{width:clamp(40px,10vw,70px);height:clamp(40px,10vw,70px);border-radius:10px;background:rgba(255,255,255,0.1);padding:4px}
.start-overlay h1{color:#f1c40f;font-size:clamp(24px,7vw,42px);margin-bottom:4px}
.start-overlay p{color:#aaa;font-size:clamp(12px,2.5vw,15px);margin-bottom:16px}
.start-overlay .start-btn{padding:14px 44px;font-size:clamp(18px,4vw,24px);font-weight:700;background:linear-gradient(135deg,#c8a85e,#8a7a3a);color:#1a1a2e;border:none;border-radius:16px;cursor:pointer;letter-spacing:2px}
</style>
</head>
<body>
<div class="game">
  <div class="header">
    <span>🏛️ Via Gálica</span>
    <span class="level" id="levelDisplay">Nível 1</span>
    <span class="score" id="scoreDisplay">0 ⭐</span>
  </div>
  <div class="road-label" id="roadLabel">⚔️ Liga a estrada até ao javali!</div>
  
  <div class="grid-area">
    <div class="grid" id="grid"></div>
  </div>
  
  <div class="choices" id="choices"></div>
  <div class="feedback" id="feedback"></div>
  
  <div class="win-overlay" id="winOverlay">
    <h2 id="winTitle">🏆 Vitória!</h2>
    <div class="sub" id="winSub">Salvaste o Asterix!</div>
    <div id="winReward"></div>
    <button onclick="nextLevel()">Próximo nível →</button>
  </div>
  
  <div class="start-overlay" id="startOverlay">
    <div class="logo">
      <img src="assets/obelix.png" alt=""><span style="color:#f1c40f;font-size:32px">+</span><img src="assets/boar.png" alt="">
    </div>
    <h1>Via Gálica</h1>
    <p>Ajuda o Obélix a completar a estrada! Escolhe o troço certo para ligar o caminho até ao javali 🐗</p>
    <button class="start-btn" onclick="startGame()">▶ COMEÇAR</button>
  </div>
</div>

<script>
// ========== CONSTANTS ==========
const GRID=5;
const CHARS={
  obelix:'assets/obelix.png',
  asterix:'assets/asterix.png',
  roman:'assets/roman.png',
  boar:'assets/boar.png',
  getafix:'assets/getafix.png',
  dogmatix:'assets/dogmatix.png',
};

const FOREST_CARDS=[
  // Sparse/flowery cards (duplicated for more prevalence)
  'assets/cards_sliced/forest_0_6.png','assets/cards_sliced/forest_0_6.png','assets/cards_sliced/forest_0_6.png',
  'assets/cards_sliced/forest_6_6.png','assets/cards_sliced/forest_6_6.png',
  'assets/cards_sliced/forest_5_1.png','assets/cards_sliced/forest_5_1.png',
  'assets/cards_sliced/forest_3_5.png','assets/cards_sliced/forest_3_5.png',
  // Full set
  'assets/cards_sliced/forest_0_4.png','assets/cards_sliced/forest_0_5.png','assets/cards_sliced/forest_0_7.png',
  'assets/cards_sliced/forest_1_0.png','assets/cards_sliced/forest_1_1.png','assets/cards_sliced/forest_1_2.png','assets/cards_sliced/forest_1_7.png',
  'assets/cards_sliced/forest_2_0.png','assets/cards_sliced/forest_2_1.png','assets/cards_sliced/forest_2_2.png','assets/cards_sliced/forest_2_5.png','assets/cards_sliced/forest_2_7.png',
  'assets/cards_sliced/forest_3_0.png','assets/cards_sliced/forest_3_1.png','assets/cards_sliced/forest_3_2.png','assets/cards_sliced/forest_3_3.png','assets/cards_sliced/forest_3_4.png','assets/cards_sliced/forest_3_5.png','assets/cards_sliced/forest_3_7.png',
  'assets/cards_sliced/forest_4_0.png','assets/cards_sliced/forest_4_1.png','assets/cards_sliced/forest_4_2.png','assets/cards_sliced/forest_4_3.png','assets/cards_sliced/forest_4_4.png','assets/cards_sliced/forest_4_7.png',
  'assets/cards_sliced/forest_5_0.png','assets/cards_sliced/forest_5_1.png','assets/cards_sliced/forest_5_2.png','assets/cards_sliced/forest_5_3.png','assets/cards_sliced/forest_5_4.png','assets/cards_sliced/forest_5_6.png','assets/cards_sliced/forest_5_7.png',
  'assets/cards_sliced/forest_6_0.png','assets/cards_sliced/forest_6_1.png','assets/cards_sliced/forest_6_2.png','assets/cards_sliced/forest_6_3.png','assets/cards_sliced/forest_6_4.png','assets/cards_sliced/forest_6_6.png','assets/cards_sliced/forest_6_7.png',
  'assets/cards_sliced/forest_7_0.png','assets/cards_sliced/forest_7_1.png','assets/cards_sliced/forest_7_2.png','assets/cards_sliced/forest_7_3.png','assets/cards_sliced/forest_7_4.png','assets/cards_sliced/forest_7_7.png'];

function cardSrc(r,c,type){
  if(type===0){
    var key=r+','+c;
    if(!window._fc)window._fc={};
    if(!window._fc[key])window._fc[key]=FOREST_CARDS[Math.floor(Math.random()*FOREST_CARDS.length)];
    return window._fc[key];
  }
  return 'assets/cards_sliced/road_type_'+type+'.png';
}

const SAVE_CHARS=[
  {name:'Asterix',img:'assets/asterix.png'},
  {name:'Getafix',img:'assets/getafix.png'},
  {name:'Dogmatix',img:'assets/dogmatix.png'},
];

// Road piece types: [connections top,right,bottom,left] (0=none,1=road)
// 0=empty, 1=straight NS, 2=straight EW, 3=curve NE, 4=curve SE, 5=curve SW, 6=curve NW
// 7=T-junction T, 8=T-junction R, 9=T-junction B, 10=T-junction L, 11=cross
const PIECES={
  0:[0,0,0,0],      // forest
  1:[1,0,1,0],      // │
  2:[0,1,0,1],      // ─
  3:[1,1,0,0],      // └
  4:[0,1,1,0],      // ┌
  5:[0,0,1,1],      // ┐
  6:[1,0,0,1],      // ┘
};

// SVG paths for each piece type (centered in card)
function getPieceSVG(type, w, h, hasRoman){
  const cx=w/2, cy=h/2;
  const r=Math.min(w,h)*0.35;
  const paths={
    1:`M${cx},${cy-r} L${cx},${cy+r}`,
    2:`M${cx-r},${cy} L${cx+r},${cy}`,
    3:`M${cx},${cy-r} L${cx},${cy} L${cx+r},${cy}`,
    4:`M${cx+r},${cy} L${cx},${cy} L${cx},${cy+r}`,
    5:`M${cx-r},${cy} L${cx},${cy} L${cx},${cy+r}`,
    6:`M${cx-r},${cy} L${cx},${cy} L${cx},${cy-r}`,
  };
  var d=paths[type]||'';
  return '<svg viewBox="0 0 '+w+' '+h+'" style="width:100%;height:100%;pointer-events:none">'+
    '<path d="'+d+'" stroke="#c8a85e" stroke-width="'+(r*0.4)+'" fill="none" stroke-linecap="round"/>'+
    (hasRoman ? '<image href="'+CHARS.roman+'" x="'+(cx-r*0.5)+'" y="'+(cy-r*0.5)+'" width="'+(r*0.9)+'" height="'+(r*0.9)+'" opacity="0.8"/>' : '')+
    '</svg>';
}

function getRomanFromType(type){
  return [3,4,5,6].indexOf(type)>=0;
}

// ========== ROAD GENERATION ==========
function generateRoad(){
  // Generate a continuous path from one edge to another using a snake-like pattern
  var grid=Array(GRID).fill().map(()=>Array(GRID).fill(0));
  var dirs=[[-1,0],[0,1],[1,0],[0,-1]]; // N,E,S,W
  
  // Pick entry edge (0=N,1=E,2=S,3=W) and exit edge (must be different)
  var entryEdge=Math.floor(Math.random()*4);
  var exitEdge;
  do{exitEdge=Math.floor(Math.random()*4);}while(exitEdge===entryEdge);
  
  var cr,cc;
  if(entryEdge===0){cr=0;cc=Math.floor(Math.random()*GRID);}
  else if(entryEdge===1){cr=Math.floor(Math.random()*GRID);cc=GRID-1;}
  else if(entryEdge===2){cr=GRID-1;cc=Math.floor(Math.random()*GRID);}
  else{cr=Math.floor(Math.random()*GRID);cc=0;}
  
  var path=[[cr,cc]];
  var used={};
  used[cr+','+cc]=true;
  
  // Determine primary direction based on entry/exit
  var primaryDir;
  if(entryEdge===0)primaryDir=2; // S
  else if(entryEdge===1)primaryDir=3; // W
  else if(entryEdge===2)primaryDir=0; // N
  else primaryDir=1; // E
  
  // Build path by moving in primary direction with occasional turns
  var turnCounter=0;
  var maxSeg=GRID*GRID;
  for(var i=0;i<maxSeg;i++){
    var nr=cr+dirs[primaryDir][0];
    var nc=cc+dirs[primaryDir][1];
    
    // If at edge or used, try a turn
    if(nr<0||nr>=GRID||nc<0||nc>=GRID||used[nr+','+nc]){
      // Try turning left or right
      var turnDirs=[(primaryDir+1)%4,(primaryDir+3)%4,(primaryDir+2)%4];
      var turned=false;
      for(var t=0;t<turnDirs.length;t++){
        var td=turnDirs[t];
        nr=cr+dirs[td][0];
        nc=cc+dirs[td][1];
        if(nr>=0&&nr<GRID&&nc>=0&&nc<GRID&&!used[nr+','+nc]){
          primaryDir=td;
          turned=true;
          break;
        }
      }
      if(!turned)break; // stuck
    }
    
    cr=nr;cc=nc;
    path.push([cr,cc]);
    used[cr+','+cc]=true;
    
    // Check if reached exit edge
    var atEdge=false;
    if(exitEdge===0&&cr===0)atEdge=true;
    else if(exitEdge===1&&cc===GRID-1)atEdge=true;
    else if(exitEdge===2&&cr===GRID-1)atEdge=true;
    else if(exitEdge===3&&cc===0)atEdge=true;
    
    if(atEdge&&path.length>=5){break;}
  }
  
  // Fallback: if path too short, use a guaranteed zigzag
  if(path.length<5){
    return generateFallbackPath(entryEdge,exitEdge);
  }
  
  // Set road piece types based on connections
  var roadGrid=Array(GRID).fill().map(()=>Array(GRID).fill(0));
  var romanPositions=[];
  
  for(var i=0;i<path.length;i++){
    var pr=path[i][0],pc=path[i][1];
    var conn=[0,0,0,0]; // N,E,S,W
    
    if(i>0){
      var dr=path[i][0]-path[i-1][0];
      if(dr===1)conn[0]=1; // previous is NORTH → connect NORTH
      if(dr===-1)conn[2]=1; // previous is SOUTH → connect SOUTH
      var dc=path[i][1]-path[i-1][1];
      if(dc===1)conn[3]=1; // previous is LEFT/WEST → connect WEST
      if(dc===-1)conn[1]=1; // previous is RIGHT/EAST → connect EAST
    }
    if(i<path.length-1){
      var dr=path[i+1][0]-path[i][0];
      if(dr===1)conn[2]=1; // next is SOUTH → connect SOUTH
      if(dr===-1)conn[0]=1; // next is NORTH → connect NORTH
      var dc=path[i+1][1]-path[i][1];
      if(dc===1)conn[1]=1; // next is EAST → connect EAST
      if(dc===-1)conn[3]=1; // next is WEST → connect WEST
    }
    
    var type=0;
    if(conn[0]&&conn[2])type=1;
    else if(conn[1]&&conn[3])type=2;
    else if(conn[0]&&conn[1])type=3;
    else if(conn[1]&&conn[2])type=4;
    else if(conn[2]&&conn[3])type=5;
    else if(conn[0]&&conn[3])type=6;
    else if(conn[0])type=1; // dead end N
    else if(conn[2])type=1; // dead end S
    else if(conn[1])type=2; // dead end E
    else if(conn[3])type=2; // dead end W
    
    roadGrid[pr][pc]=type;
    
    // Place Romans on curves (not on entry/exit)
    if([3,4,5,6].indexOf(type)>=0 && i>0 && i<path.length-1 && Math.random()<0.5){
      romanPositions.push([pr,pc]);
    }
  }
  
  return {grid:roadGrid,path:path,entry:path[0],exit:path[path.length-1],romans:romanPositions};
}

function generateFallbackPath(entryEdge,exitEdge){
  var grid=Array(GRID).fill().map(()=>Array(GRID).fill(0));
  var path=[];
  
  // Simple snake: go from entry column, zigzag through middle
  var cStart=Math.floor(GRID/2);
  var r=0, c=cStart;
  
  if(entryEdge===0)r=0;
  else if(entryEdge===2)r=GRID-1;
  if(entryEdge===1)c=GRID-1;
  else if(entryEdge===3)c=0;
  
  path.push([r,c]);
  
  // Go to the middle
  var targetR=Math.floor(GRID/2);
  while(r!==targetR){
    r+=r<targetR?1:-1;
    path.push([r,c]);
  }
  // Go across
  var targetC=GRID-1-c;
  while(c!==targetC){
    c+=c<targetC?1:-1;
    path.push([r,c]);
  }
  // Go to exit edge
  if(exitEdge===0){while(r>0){r--;path.push([r,c]);}}
  else if(exitEdge===2){while(r<GRID-1){r++;path.push([r,c]);}}
  else if(exitEdge===1){while(c<GRID-1){c++;path.push([r,c]);}}
  else{while(c>0){c--;path.push([r,c]);}}
  
  // Set types
  var romanPos=[];
  for(var i=0;i<path.length;i++){
    var pr=path[i][0],pc=path[i][1];
    var conn=[0,0,0,0];
    if(i>0){
      var dr=path[i][0]-path[i-1][0];
      if(dr===1)conn[0]=1;if(dr===-1)conn[2]=1; // previous N/S → connect N/S
      var dc=path[i][1]-path[i-1][1];
      if(dc===1)conn[3]=1;if(dc===-1)conn[1]=1; // previous W/E → connect W/E
    }
    if(i<path.length-1){
      var dr=path[i+1][0]-path[i][0];
      if(dr===1)conn[2]=1;if(dr===-1)conn[0]=1;
      var dc=path[i+1][1]-path[i][1];
      if(dc===1)conn[1]=1;if(dc===-1)conn[3]=1;
    }
    var type=0;
    if(conn[0]&&conn[2])type=1;
    else if(conn[1]&&conn[3])type=2;
    else if(conn[0]&&conn[1])type=3;
    else if(conn[1]&&conn[2])type=4;
    else if(conn[2]&&conn[3])type=5;
    else if(conn[0]&&conn[3])type=6;
    else if(conn[0]||conn[2])type=1;
    else if(conn[1]||conn[3])type=2;
    
    grid[pr][pc]=type;
    if([3,4,5,6].indexOf(type)>=0&&i>0&&i<path.length-1&&Math.random()<0.5){
      romanPos.push([pr,pc]);
    }
  }
  
  return {grid:grid,path:path,entry:path[0],exit:path[path.length-1],romans:romanPos};
}

// ========== GAME STATE ==========
var level=1,score=0,missingCount=1;
var roadGrid,roadPath,entryCell,exitCell,romanCells;
var missingPositions=[],currentAnswers=[];
var isWaiting=false,audioInit=false;

function initAudio(){if(audioInit)return;audioInit=true;try{new AudioContext()}catch(e){}}

function speak(t){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  var u=new SpeechSynthesisUtterance(t);
  u.lang='pt-PT';u.rate=0.85;
  window.speechSynthesis.speak(u);
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

function startGame(){
  initAudio();
  document.getElementById('startOverlay').classList.add('hidden');
  level=1;score=0;
  document.getElementById('scoreDisplay').textContent='0 ⭐';
  buildLevel();
}

function buildLevel(){
  missingCount=Math.min(1+Math.floor(level/2),4);
  document.getElementById('levelDisplay').textContent='Nível '+level;
  
  var roadData=generateRoad();
  roadGrid=roadData.grid;
  roadPath=roadData.path;
  entryCell=roadData.entry;
  exitCell=roadData.exit;
  romanCells=roadData.romans;
  
  // Pick missing positions from road cells (non-entry, non-exit)
  var candidates=[];
  for(var i=1;i<roadPath.length-1;i++){
    candidates.push({r:roadPath[i][0],c:roadPath[i][1]});
  }
  shuffle(candidates);
  missingPositions=candidates.slice(0,Math.min(missingCount,candidates.length));
  
  // Store correct answer types BEFORE resetting
  currentAnswers=[];
  missingPositions.forEach(function(pos){
    currentAnswers.push(roadGrid[pos.r][pos.c]);
  });
  
  // Clear roadGrid at missing positions so allFilled check works
  missingPositions.forEach(function(pos){
    roadGrid[pos.r][pos.c]=0;
  });
  
  renderGrid();
  renderChoices();
}

function renderGrid(){
  var g=document.getElementById('grid');
  g.innerHTML='';
  var cellW=Math.floor(100/GRID);
  
  for(var r=0;r<GRID;r++){
    for(var c=0;c<GRID;c++){
      var card=document.createElement('div');
      card.className='card';
      card.dataset.r=r;card.dataset.c=c;
      
      var isMissing=missingPositions.some(function(p){return p.r===r&&p.c===c});
      var isEntry=r===entryCell[0]&&c===entryCell[1];
      var isExit=r===exitCell[0]&&c===exitCell[1];
      
      if(isMissing){
        card.className+=' missing';
        var isNext=missingPositions[0]&&missingPositions[0].r===r&&missingPositions[0].c===c;
        if(isNext){
          card.className+=' active-missing';
        }
        card.innerHTML='<div class="qmark">?</div>';
      }else if(roadGrid[r][c]>0){
        card.className+=' road';
        var img=document.createElement('img');
        img.src='assets/cards_sliced/GoodGen_'+roadGrid[r][c]+'.png';
        img.style.cssText='width:100%;height:100%;object-fit:cover;display:block;pointer-events:none';
        card.appendChild(img);
        // Romans on curve cards
        if(roadGrid[r][c]>=3&&roadGrid[r][c]<=6&&Math.random()<0.4){
          var rom=document.createElement('img');
          rom.src=CHARS.roman;
          rom.style.cssText='position:absolute;bottom:clamp(4px,1vw,8px);right:clamp(2px,0.5vw,5px);width:clamp(14px,3.5vw,28px);height:clamp(14px,3.5vw,28px);z-index:2;object-fit:contain;opacity:0.9';
          card.appendChild(rom);
        }
        if(isEntry){
          var icon=document.createElement('img');
          icon.className='char-icon';
          icon.src=CHARS.obelix;
          icon.style.cssText='position:absolute;left:2px;top:2px;width:clamp(14px,3.5vw,26px);height:clamp(14px,3.5vw,26px);z-index:2';
          card.appendChild(icon);
        }
        if(isExit){
          var icon=document.createElement('img');
          icon.className='char-icon';
          icon.src=Math.random()<0.5?CHARS.boar:SAVE_CHARS[Math.floor(Math.random()*SAVE_CHARS.length)].img;
          icon.style.cssText='position:absolute;right:2px;bottom:2px;width:clamp(14px,3.5vw,26px);height:clamp(14px,3.5vw,26px);z-index:2';
          card.appendChild(icon);
        }
      }else{
        card.className+=' forest';
        var fimg=document.createElement('img');
        fimg.src=cardSrc(r,c,0);
        fimg.style.cssText='width:100%;height:100%;object-fit:cover;display:block;pointer-events:none';
        card.appendChild(fimg);
      }
      
      g.appendChild(card);
    }
  }
}

function exitCellType(){
  var types=roadGrid[exitCell[0]][exitCell[1]];
  var hasRoman=romanCells.some(function(p){return p[0]===exitCell[0]&&p[1]===exitCell[1]});
  return {type:types,hasRoman:hasRoman};
}

function renderChoices(){
  var cd=document.getElementById('choices');
  cd.innerHTML='';
  
  // Generate 4 choices: 1 correct + 3 wrong
  var choices=[];
  // Find the correct types
  var correctTypes=currentAnswers.slice(); // copy
  
  // Add distractors
  var allTypes=[1,2,3,4,5,6];
  correctTypes.forEach(function(t){choices.push(t);});
  
  // Fill remaining with random types that won't fit the missing positions
  while(choices.length<4){
    var rt=allTypes[Math.floor(Math.random()*allTypes.length)];
    // Avoid giving the correct answer as extra option (since it's already there)
    if(choices.indexOf(rt)>=0 && choices.filter(function(x){return x===rt}).length>=2)continue;
    choices.push(rt);
  }
  shuffle(choices);
  
  choices.forEach(function(type,idx){
    var btn=document.createElement('div');
    btn.className='choice-btn';
    btn.dataset.type=type;
    var cimg=document.createElement('img');
    cimg.src='assets/cards_sliced/GoodGen_'+type+'.png';
    cimg.style.cssText='width:100%;height:100%;object-fit:cover;display:block;pointer-events:none';
    btn.appendChild(cimg);
    
    btn.addEventListener('click',function(){
      if(isWaiting)return;
      checkChoice(this,parseInt(this.dataset.type));
    });
    cd.appendChild(btn);
  });
}

function checkChoice(el,type){
  isWaiting=true;
  
  // Find next missing position
  var nextIdx=0;
  for(var i=0;i<missingPositions.length;i++){
    var pos=missingPositions[i];
    if(roadGrid[pos.r][pos.c]===0){
      nextIdx=i;
      break;
    }
  }
  
  var correctType=currentAnswers[nextIdx];
  
  if(type===correctType){
    el.classList.add('correct');
    var pos=missingPositions[nextIdx];
    roadGrid[pos.r][pos.c]=type;
    
    // Re-render that card
    var cards=document.querySelectorAll('.card');
    var cardIdx=pos.r*GRID+pos.c;
    var card=cards[cardIdx];
    if(card){
      card.className='card road filled';
      var hasRoman=romanCells.some(function(p){return p[0]===pos.r&&p[1]===pos.c});
      card.innerHTML='<img src="assets/cards_sliced/GoodGen_'+type+'.png" style="width:100%;height:100%;object-fit:cover;display:block;pointer-events:none">';
      if(hasRoman){
        card.innerHTML+='<img src="'+CHARS.roman+'" style="position:absolute;bottom:clamp(4px,1vw,8px);right:clamp(2px,0.5vw,5px);width:clamp(14px,3.5vw,28px);height:clamp(14px,3.5vw,28px);z-index:2;object-fit:contain;opacity:0.9">';
      }
    }
    
    // Update active glow to next missing
    document.querySelectorAll('.card').forEach(function(c){
      c.classList.remove('active-missing');
    });
    // Find next unfilled missing position
    var nextPos=null;
    for(var i=0;i<missingPositions.length;i++){
      var p=missingPositions[i];
      if(roadGrid[p.r][p.c]===0){nextPos=p;break;}
    }
    if(nextPos){
      var nextCards=document.querySelectorAll('.card');
      var nextIdx2=nextPos.r*GRID+nextPos.c;
      if(nextCards[nextIdx2])nextCards[nextIdx2].classList.add('active-missing');
    }
    
    document.getElementById('feedback').textContent='✅ Correto!';
    document.getElementById('feedback').className='feedback ok';
    score++;
    document.getElementById('scoreDisplay').textContent=score+' ⭐';
    
    // Check if all missing filled
    var allFilled=missingPositions.every(function(p){return roadGrid[p.r][p.c]>0});
    if(allFilled){
      setTimeout(showVictory,800);
    }else{
      setTimeout(function(){isWaiting=false;},600);
    }
  }else{
    el.classList.add('wrong');
    document.getElementById('feedback').textContent='❌ Não encaixa!';
    document.getElementById('feedback').className='feedback fail';
    setTimeout(function(){
      el.classList.remove('wrong');
      isWaiting=false;
    },700);
  }
}

function showVictory(){
  // Determine the reward at the exit cell
  var exitType=exitCellType();
  var isBoar=!exitType.hasRoman&&Math.random()<0.5;
  
  // Walk animation: highlight road cells one by one to simulate Obelix walking
  var delay=0;
  roadPath.forEach(function(pos,idx){
    if(idx===0)return; // skip start (Obelix is already there)
    delay+=150;
    setTimeout(function(){
      var card=document.querySelectorAll('.card')[pos[0]*GRID+pos[1]];
      if(card)card.style.boxShadow='inset 0 0 15px rgba(241,196,15,0.5)';
    },delay);
  });
  
  // Victory overlay after walk
  var walkTime=roadPath.length*150+500;
  setTimeout(function(){
    var overlay=document.getElementById('winOverlay');
    document.getElementById('winTitle').textContent='🏆 Vitória!';
    
    if(isBoar){
      document.getElementById('winSub').textContent='Obelix encontrou o javali assado! 🐗';
      document.getElementById('winReward').innerHTML='<img src="'+CHARS.boar+'" class="reward-img" style="width:clamp(80px,20vw,150px);height:clamp(80px,20vw,150px);object-fit:contain;border-radius:12px;background:rgba(255,255,255,0.1);padding:8px">';
      speak('Obelix encontrou o javali!');
    }else{
      var rChar=SAVE_CHARS[Math.floor(Math.random()*SAVE_CHARS.length)];
      document.getElementById('winSub').textContent='Salvaste o '+rChar.name+'! 🎉';
      document.getElementById('winReward').innerHTML='<img src="'+rChar.img+'" class="reward-img" style="width:clamp(80px,20vw,150px);height:clamp(80px,20vw,150px);object-fit:contain;border-radius:12px;background:rgba(255,255,255,0.1);padding:8px">';
      speak('Salvaste o '+rChar.name+'!');
    }
    
    overlay.classList.add('active');
    isWaiting=false;
  },walkTime);
}

function nextLevel(){
  document.getElementById('winOverlay').classList.remove('active');
  level++;
  buildLevel();
}

function restartGame(){
  document.getElementById('winOverlay').classList.remove('active');
  startGame();
}
</script>
